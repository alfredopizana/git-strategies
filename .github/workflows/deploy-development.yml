name: Deploy to Development

on:
  push:
    branches:
      - main
      # -------------------------------------------------------
      # BYPASS: Add your branch name below to deploy directly
      # (useful for testing cloud/data changes before merging)
      # Example: - feat/GCP-101
      # -------------------------------------------------------

jobs:
  deploy:
    uses: ./.github/workflows/deploy-shared.yml
    with:
      environment: development
